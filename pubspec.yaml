name: Sismalat
description: "Sistem Manajemen Alat Ukur - Disperindag Karawang"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  mobile_scanner: ^7.2.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.0.7
  provider: ^6.1.5+1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # ✅ TAMBAHKAN INI - Flutter Launcher Icons
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# ✅ KONFIGURASI FLUTTER LAUNCHER ICONS (di root level, BUKAN di dalam flutter:)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logos.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logos.png"
  min_sdk_android: 21